# docker-compose.yml
version: '3.8'

services:
  churn-dashboard:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./notebooks:/app/notebooks
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
    command: python src/app.py
    container_name: churn-early-warning

networks:
  default:
    name: churn-network